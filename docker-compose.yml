services:
  postgres:
    image: postgres:15-alpine
    container_name: sync_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sinkronisasi_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sync_api
    command: [ "/app/api_bin" ]
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=host=postgres user=postgres password=postgres dbname=sinkronisasi_db port=5432 sslmode=disable
      - REDIS_ADDR=redis:6379
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sync_worker
    command: [ "/app/worker_bin" ]
    environment:
      - DATABASE_URL=host=postgres user=postgres password=postgres dbname=sinkronisasi_db port=5432 sslmode=disable
      - REDIS_ADDR=redis:6379
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
